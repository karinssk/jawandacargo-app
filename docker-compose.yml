services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-utm_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-utm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-utm_user} -d ${POSTGRES_DB:-utm_tracking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3101:3101"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3101
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-utm_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-utm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LIFF_ID: ${LIFF_ID}
      LINE_OA_ID: ${LINE_OA_ID}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}
      CRON_SECRET: ${CRON_SECRET}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3100:3100"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3100
      BACKEND_URL: http://backend:3101

  cron:
    image: curlimages/curl:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CRON_SECRET: ${CRON_SECRET}
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        sleep 900;
        curl -sf -X POST http://backend:3101/api/cron/expire-orders
          -H 'Authorization: Bearer $$CRON_SECRET' || true;
      done"

volumes:
  postgres_data:
